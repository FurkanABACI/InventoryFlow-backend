services:
  db:
    image: postgres:17
    container_name: inventoryflow-db
    environment:
      POSTGRES_DB: inventory_flow
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5432:5432"
    volumes:
      - inventoryflow_postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: inventoryflow-api
    depends_on:
      - db
    environment:
      SECRET_KEY: docker-dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      POSTGRES_DB: inventory_flow
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  inventoryflow_postgres_data:
